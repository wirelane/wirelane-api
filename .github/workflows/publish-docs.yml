name: publish-docs

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up node
        uses: actions/setup-node@v6
      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@latest
      - name: Redocly build docs
        run: redocly build-docs openapi.yml -o dist/index.html --theme.openapi.disableSearch --theme.openapi.requiredPropsFirst --theme.openapi.sortPropsAlphabetically
      - name: Deploy to GitHub pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
